<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MADE — Manual Approach in Digital Environment</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a0f;
        color: #e0e0e8;
        font-family: system-ui, sans-serif;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      /* Layer 1 — camera feed: mirrored so it reads as a mirror */
      #video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        opacity: 0.28;
        z-index: 1;
      }

      /* Layer 2 — Three.js 3D scene: transparent background, NOT mirrored */
      #scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      /* Layer 3 — 2D landmark overlay: mirrored to match video */
      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
        pointer-events: none;
        z-index: 3;
      }

      /* Layer 4 — HUD */
      #hud {
        position: absolute;
        top: 1.2rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        pointer-events: none;
        z-index: 4;
      }
      #hud h1 { font-size: 1.6rem; letter-spacing: 0.3em; color: #a0c4ff; }
      #hud .status {
        font-size: 0.8rem;
        color: #a0c4ff99;
        padding: 0.25em 0.9em;
        border: 1px solid #a0c4ff33;
        border-radius: 999px;
      }

      /* Loading / permission screen */
      #splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0a0a0f;
        z-index: 10;
        transition: opacity 0.5s;
      }
      #splash h1 { font-size: 3rem; letter-spacing: 0.2em; color: #a0c4ff; }
      #splash p  { font-size: 1rem; opacity: 0.6; max-width: 380px; text-align: center; }
      #splash.hidden { opacity: 0; pointer-events: none; }

      #reset-btn {
        position: absolute;
        top: 1.2rem;
        right: 1.2rem;
        background: transparent;
        border: 1px solid #a0c4ff44;
        color: #a0c4ff88;
        padding: 0.35em 0.85em;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.78rem;
        font-family: system-ui, sans-serif;
        z-index: 4;
        transition: border-color 0.15s, color 0.15s;
      }
      #reset-btn:hover { border-color: #a0c4ffbb; color: #a0c4ff; }
    </style>
  </head>
  <body>
    <div id="splash">
      <h1>MADE</h1>
      <p>Loading hand tracking model…<br>Camera permission required.</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="scene"></canvas>
    <canvas id="overlay"></canvas>

    <button id="reset-btn">&#x21BA; reset view</button>

    <div id="hud">
      <h1>MADE</h1>
      <div class="status" id="status">initialising…</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
